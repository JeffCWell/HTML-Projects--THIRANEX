<body>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
    <div class="bg-circle circle-3"></div>

    <div class="container">

        <header>
            <h1>🌤 Weather Dashboard</h1>
            <p>Real-Time Weather Information</p>
        </header>

        <div class="search-section">
            <input
                type="text"
                id="city-input"
                placeholder="Enter city name">

            <button id="search-btn">
                Search
            </button>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
        </div>

        <div id="error-message" class="hidden"></div>

        <!-- Weather Card -->
        <div class="weather-card hidden" id="weather-card">

            <h2 id="city-name"></h2>

            <p id="current-date"></p>

            <img
                id="weather-icon"
                src=""
                alt="Weather Icon">

            <p id="description"></p>

            <div class="weather-details">

                <div class="detail-box">
                    <h3>🌡 Temperature</h3>
                    <p id="temperature"></p>
                </div>

                <div class="detail-box">
                    <h3>🤗 Feels Like</h3>
                    <p id="feels-like"></p>
                </div>

                <div class="detail-box">
                    <h3>💧 Humidity</h3>
                    <p id="humidity"></p>
                </div>

                <div class="detail-box">
                    <h3>🌬 Wind Speed</h3>
                    <p id="wind-speed"></p>
                </div>

                <div class="detail-box">
                    <h3>📊 Pressure</h3>
                    <p id="pressure"></p>
                </div>

                <div class="detail-box">
                    <h3>👁 Visibility</h3>
                    <p id="visibility"></p>
                </div>

            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

<link rel="stylesheet" href="css/style.css">
